<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="flex">
    <div class="container flex">
        <p id="display" class="flex">0</p>
        <div class="btns flex">
            <button id="increase" class="flex">Increase</button>
            <button id="reset" class="flex">Reset</button>
            <button id="decrease" class="flex">Decrease</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
